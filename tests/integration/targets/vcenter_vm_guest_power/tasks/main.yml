---
- name: Test vcenter_vm_guest_power_info against MockServer
  environment: "{{ environment_auth_vars }}"
  block:
    - name: Load API spec expectations
      ansible.builtin.uri:
        url: http://localhost:1080/mockserver/openapi
        method: PUT
        status_code: [200, 201]
        body_format: json
        body:
          specUrlOrPayload: "file:/mockserver_specs/default.json"
          operationsAndResponses:
            Vcenter.Vm.Guest.Power_get: "200"

    - name: Invoke vcenter_vm_guest_power_info
      vmware.vmware_rest.vcenter_vm_guest_power_info:
        vm: vm-1001
      register: result

    - name: Assert module returned value
      ansible.builtin.assert:
        that:
          - result.value is defined
          - result.value.state == 'RUNNING'
          - result.value.operations_ready is true
