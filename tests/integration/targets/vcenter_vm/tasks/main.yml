---
- name: Test vcenter_vm_info against MockServer
  environment: "{{ environment_auth_vars }}"
  block:
    - name: Load API spec expectations
      ansible.builtin.uri:
        url: http://localhost:1080/mockserver/openapi
        method: PUT
        status_code: [200, 201]
        body_format: json
        body:
          specUrlOrPayload: "file:/mockserver_specs/default.json"
          operationsAndResponses:
            Vcenter.VM_list: "200"

    - name: List virtual machines (empty)
      vmware.vmware_rest.vcenter_vm_info: {}
      register: list_vm_info

    - name: Assert empty VM list
      ansible.builtin.assert:
        that:
          - list_vm_info.value is defined
          - list_vm_info.value | length == 0
