# Ethernet tests
- name: List the ethernet adapters
  vmware.vmware_rest.vcenter_vm_hardware_ethernet_info:
    vm: "{{ _test_vm_moid }}"
  register: _list_ethernet_info

- name: Verify ethernet list
  ansible.builtin.assert:
    that:
      - _list_ethernet_info.value | length >= 0

- name: Get information about a specific ethernet adapter
  vmware.vmware_rest.vcenter_vm_hardware_ethernet_info:
    vm: "{{ _test_vm_moid }}"
    nic: "{{ _list_ethernet_info.value[0].nic }}"
  register: _get_single_ethernet_info
  when: _list_ethernet_info.value | length > 0

- name: Get the dvswitch called {{ test_network_name }}
  vmware.vmware_rest.vcenter_network_info:
    filter_types: DISTRIBUTED_PORTGROUP
    filter_names: "{{ test_network_name }}"
  register: portgroup_info
  when: _list_ethernet_info.value | length > 0

- name: Verify ethernet info
  ansible.builtin.assert:
    that:
      - _get_single_ethernet_info.value is defined
      - _get_single_ethernet_info.id is defined
      - portgroup_info.value | length == 1
  when: _list_ethernet_info.value | length > 0
