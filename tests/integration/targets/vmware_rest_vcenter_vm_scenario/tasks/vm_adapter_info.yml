---
# SCSI tests
- name: List the SCSI adapters
  vmware.vmware_rest.vcenter_vm_hardware_adapter_scsi_info:
    vm: "{{ _test_vm_moid }}"
  register: _list_scsi_info

- name: Verify SCSI list
  ansible.builtin.assert:
    that:
      - _list_scsi_info.value | length == 1

- name: Get information about a specific scsi controller
  vmware.vmware_rest.vcenter_vm_hardware_adapter_scsi_info:
    vm: "{{ _test_vm_moid }}"
    adapter: "{{ _list_scsi_info.value[0].adapter }}"
  register: _get_single_scsi_info

- name: Verify SCSI info
  ansible.builtin.assert:
    that:
      - _get_single_scsi_info.value is defined
      - _get_single_scsi_info.id is defined

# SATA tests
- name: List the SATA adapters
  vmware.vmware_rest.vcenter_vm_hardware_adapter_sata_info:
    vm: "{{ _test_vm_moid }}"
  register: _list_sata_info

- name: Verify SATA list
  ansible.builtin.assert:
    that:
      - _list_sata_info.value | length >= 0

- name: Get information about a specific SATA controller
  vmware.vmware_rest.vcenter_vm_hardware_adapter_sata_info:
    vm: "{{ _test_vm_moid }}"
    adapter: "{{ _list_sata_info.value[0].adapter }}"
  register: _get_single_sata_info
  when: _list_sata_info.value | length > 0

- name: Verify SATA info
  ansible.builtin.assert:
    that:
      - _get_single_sata_info.value is defined
      - _get_single_sata_info.id is defined
  when: _list_sata_info.value | length > 0

