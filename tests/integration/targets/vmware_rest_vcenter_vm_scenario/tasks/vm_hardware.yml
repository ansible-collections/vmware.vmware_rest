---
- name: Collect the hardware information
  vmware.vmware_rest.vcenter_vm_hardware_info:
    vm: "{{ _test_vm_moid }}"
  register: vm_hardware_info

- name: Verify VM hardware info
  ansible.builtin.assert:
    that:
      - vm_hardware_info.value | length > 0
