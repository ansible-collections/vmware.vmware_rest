---
- name: Run vmware_rest_vcenter_vm_scenario test
  # https://github.com/ansible-collections/cloud.common/issues/179
  environment:
    VMWARE_HOST: "{{ vcenter_hostname }}"
    VMWARE_USER: "{{ vcenter_username }}"
    VMWARE_PASSWORD: "{{ vcenter_password }}"
    VMWARE_VALIDATE_CERTS: "False"
    VMWARE_PORT: "{{ vcenter_port }}"
  block:
    - name: Set facts for tests
      ansible.builtin.set_fact:
        cluster_id: "{{ lookup('vmware.vmware.moid_from_path', '/' + vcenter_datacenter + '/host/' + vcenter_cluster_name, **vmware_rest_auth_vars) }}"
        folder_id: "{{ lookup('vmware.vmware.moid_from_path', '/' + vcenter_datacenter + '/vm/' + vcenter_vm_folder, type='folder', **vmware_rest_auth_vars) }}"
        datastore_id: "{{ lookup('vmware.vmware.moid_from_path', '/' + vcenter_datacenter + '/datastore/' + shared_storage_01, **vmware_rest_auth_vars) }}"
        resource_pool_parent_id: "{{ lookup('vmware.vmware.moid_from_path', '/' + vcenter_datacenter + '/host/' + vcenter_cluster_name + '/' + vcenter_resource_pool, **vmware_rest_auth_vars) }}"

    - include_tasks: create_vm.yml
    - include_tasks: vm_info.yml
    - include_tasks: vm_power_info.yml
    - include_tasks: vm_hardware.yml
    - include_tasks: vm_adapter_info.yml
    - include_tasks: vm_hardware_storage_policy.yml
    - include_tasks: vm_hardware_boot_device.yml
    - include_tasks: vm_hardware_flo.yml
    - include_tasks: vm_hardware_parallel.yml
    - include_tasks: vm_hardware_serial.yml

    # Can't be changed efi_legacy_boot due to the https://issues.redhat.com/browse/ACA-2216
    # - include_tasks: vm_hardware_boot.yml

  always:
    - name: Delete VM
      vmware.vmware.vm:
        moid: "{{ _test_vm_moid }}"
        state: absent
      when: _test_vm_moid is defined
