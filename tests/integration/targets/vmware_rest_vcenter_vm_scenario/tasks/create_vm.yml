---
- name: Create a VM
  vmware.vmware.vm:
    datacenter: "{{ vcenter_datacenter }}"
    cluster: "{{ vcenter_cluster_name }}"
    datastore: "{{ shared_storage_01 }}"
    folder: "{{ vcenter_vm_folder }}"
    name: "{{ test_vm_name }}"
    guest_id: rhel9_64Guest
    memory:
      size_mb: 512
    cpu:
      cores: 2
    scsi_controllers:
      - controller_type: paravirtual
        bus_number: 0
    sata_controllers:
      - bus_number: 0
    network_adapters:
      - adapter_type: e1000
        network: "{{ vm_network_name }}"
    disks:
      - device_node: SCSI(0:0)
        size: 10gb
        provisioning: thin
    cdroms:
      - device_node: IDE(0:0)
        client_device_mode: passthrough
  register: _test_vm

- name: Store MOID
  ansible.builtin.set_fact:
    _test_vm_moid: "{{ _test_vm.vm.moid }}"
