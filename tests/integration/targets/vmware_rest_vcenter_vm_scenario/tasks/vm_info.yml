---
- name: Search VM with an invalid filter
  vmware.vmware_rest.vcenter_vm_info:
    filter_names: test_vm_does_not_exists
  register: _should_be_empty

- name: Verify no VM found
  ansible.builtin.assert:
    that:
      - _should_be_empty.value == []

- name: Get info about the VM
  vmware.vmware_rest.vcenter_vm_info:
    filter_names: "{{ _test_vm.vm.name }}"
  register: test_vm_info

- name: Lookup test vm by name
  vmware.vmware_rest.vcenter_vm_info:
    filter_names:
      - "{{ test_vm_name }}"
  register: _vm_name_info

- name: Lookup test vm by moid
  vmware.vmware_rest.vcenter_vm_info:
    vm: "{{ _test_vm_moid }}"
  register: _vm_moid_info

- name: Verify VM info
  ansible.builtin.assert:
    that:
      - _vm_name_info.value[0].name == test_vm_name
      - _vm_name_info.value[0].vm == _test_vm_moid
      - _vm_moid_info.value.name == test_vm_name
      - _vm_moid_info.id == _test_vm_moid
