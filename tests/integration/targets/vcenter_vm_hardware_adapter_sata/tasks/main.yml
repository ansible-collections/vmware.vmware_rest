---
- name: Test vcenter_vm_hardware_adapter_sata_info against MockServer
  environment: "{{ environment_auth_vars }}"
  block:
    - name: Load API spec expectations
      ansible.builtin.uri:
        url: http://localhost:1080/mockserver/openapi
        method: PUT
        status_code: [200, 201]
        body_format: json
        body:
          specUrlOrPayload: "file:/mockserver_specs/default.json"
          operationsAndResponses:
            Vcenter.Vm.Hardware.Adapter.Sata_list: "200"

    - name: List SATA adapters (empty)
      vmware.vmware_rest.vcenter_vm_hardware_adapter_sata_info:
        vm: vm-1001
      register: list_sata

    - name: Assert empty SATA adapter list
      ansible.builtin.assert:
        that:
          - list_sata.value | length == 0
